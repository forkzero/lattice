id: REQ-CLI-028
type: requirement
title: lattice push includes semantic diff since last push
body: lattice push should compute a semantic diff (added/modified/resolved/deleted nodes) since the last push and include it in the push payload. The app tracks the last-push git SHA per project so the CLI can query it as the baseline. A convenience flag lattice diff --since-push shows the diff without pushing. No local state is stored — the app is the source of truth for what it last received.
