id: REQ-CLI-023
type: requirement
title: Auth login command with device flow and encrypted credential storage
body: lattice auth login MUST implement OAuth2 device flow for authentication, storing refresh tokens encrypted at rest. Credential storage MUST use OS keyring (keyring crate) with AES-256-GCM encrypted file fallback for headless environments. Credential files MUST use 0o600 permissions, directories 0o700. MUST support auto-migration from file to keyring when available.
