id: REQ-CLI-022
type: requirement
title: Dry-run mode for mutating CLI operations
body: Mutating lattice commands (add, edit, resolve, refine) SHOULD support a --dry-run flag that validates input and prints what would be created or modified without writing to disk. This provides a safety net for agent operations and enables payload validation before execution. Lower priority than schema and skill-gen since lattice mutations are local files with git undo.
