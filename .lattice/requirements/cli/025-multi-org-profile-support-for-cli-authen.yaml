id: REQ-CLI-025
type: requirement
title: Multi-org profile support for CLI authentication
body: The CLI MUST support multiple organization contexts since API keys are scoped to user + organization. MUST store active org context in config. MUST support --org flag to override per-command. lattice auth login --org MUST switch active context. lattice auth status MUST show current org.
