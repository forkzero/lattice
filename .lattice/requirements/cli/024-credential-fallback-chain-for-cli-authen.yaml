id: REQ-CLI-024
type: requirement
title: Credential fallback chain for CLI authentication
body: 'The CLI MUST check credentials in order: (1) FORKZERO_TOKEN env var for direct token injection, (2) FORKZERO_CREDENTIALS_FILE env var for credential JSON path, (3) encrypted keyring store from lattice auth login, (4) encrypted file fallback at ~/.forkzero/credentials.enc, (5) interactive device flow prompt. MUST fail hard on explicit config errors, fall through silently on ambient sources. MUST attempt token refresh on 401 before failing.'
