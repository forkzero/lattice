id: SRC-AUTH-PATTERNS
type: source
title: Auth team CLI recommendations based on GWS CLI analysis
body: 'Recommendations from the auth team for lattice CLI auth integration. Covers: credential fallback chain (env var → keyring → encrypted file → device flow), AES-256-GCM encryption at rest, multi-org profile support, API key scope management (lattice:read, lattice:push), and anti-patterns to avoid. Complements forkzero/auth infrastructure (device flow, API key scopes, token introspection).'
