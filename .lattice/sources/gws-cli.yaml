id: SRC-GWS-CLI
type: source
title: Google Workspace CLI (gws) — dynamic schema-driven CLI with auto-generated agent skills
body: 'Open-source Rust CLI for Google Workspace APIs. Key architectural patterns: (1) Dynamic command generation from Discovery Documents at runtime — CLI surface always matches API. (2) Schema introspection command (gws schema) lets agents inspect payload shapes before constructing requests. (3) Auto-generated skills from CLI metadata via generate-skills command with BLOCKED_METHODS for dangerous operations. (4) Layered skills architecture: base services → personas → recipes. (5) Context window protection as explicit agent rule. (6) Dry-run flag for mutating operations. Apache 2.0 license.'
