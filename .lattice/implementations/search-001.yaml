id: IMP-SEARCH-001
type: implementation
title: Search Engine Module (search.rs)
body: 'Unified search engine consolidating keyword and semantic search. Provides: (1) structured search with category filtering, tag intersection, keyword matching, graph proximity, ID prefix matching, status filtering; (2) optional vector-based semantic search using fastembed (all-MiniLM-L6-v2, 384 dimensions, 23MB ONNX model) behind the vector-search Cargo feature flag; (3) content-hash caching (SHA-256) to skip unchanged nodes on index rebuild; (4) binary embedding I/O format; (5) cosine similarity scoring with brute-force search; (6) unified SearchResult type with optional score field. CLI exposes --index, --index-status, --semantic, --limit flags. MCP tool exposes semantic and limit parameters.'
